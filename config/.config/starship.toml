"$schema" = 'https://starship.rs/config-schema.json'

scan_timeout = 30
command_timeout = 500
add_newline = true
palette = "catppuccin_mocha"

format = """
$os$directory$git_branch$git_status$docker_context$python$nodejs$rust$golang
$fill$cmd_duration
$character"""

right_format = """$time"""

# ───────────────────────────────────
# Palette — Catppuccin Mocha (official)
# ───────────────────────────────────
[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
subtext1  = "#bac2de"
subtext0  = "#a6adc8"
overlay2  = "#9399b2"
overlay1  = "#7f849c"
overlay0  = "#6c7086"
surface2  = "#585b70"
surface1  = "#45475a"
surface0  = "#313244"
base      = "#1e1e2e"
mantle    = "#181825"
crust     = "#11111b"

# ───────────────────────────────────
# OS — визуальный якорь строки
# ───────────────────────────────────
[os]
disabled = false
style = "fg:lavender bold"
format = "[$symbol]($style) "

[os.symbols]
Arch = "󰣇"
Linux = "󰌽"
Unknown = "󰋗"

# ───────────────────────────────────
# Directory
# ───────────────────────────────────
[directory]
style = "fg:sapphire bold"
format = "[󰉋 $path]($style)[$read_only]($read_only_style) "
home_symbol = "~"
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"
read_only = " 󰌾"
read_only_style = "fg:red"

# ───────────────────────────────────
# Git
# ───────────────────────────────────
[git_branch]
symbol = "󰘬"
style = "fg:mauve bold"
format = "[$symbol $branch]($style) "

[git_status]
style = "fg:yellow"
format = "([$conflicted$stashed$deleted$renamed$modified$staged$untracked]($style))([ $ahead_behind]($style)) "
conflicted = "󰞇 "
stashed = "󰆼 "
deleted = "✘ "
renamed = "󰑕 "
modified = "! "
staged = "+"
untracked = "? "
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"

# ───────────────────────────────────
# Languages / tooling
# ───────────────────────────────────
[python]
symbol = ""
style = "fg:green bold"
format = "[$symbol$version]($style) [$virtualenv](fg:overlay2) "
detect_extensions = ["py"]
detect_files = ["pyproject.toml", "requirements.txt", ".python-version"]

[nodejs]
symbol = ""
style = "fg:green bold"
format = "[$symbol$version]($style) "

[rust]
symbol = ""
style = "fg:maroon bold"
format = "[$symbol$version]($style) "

[golang]
symbol = ""
style = "fg:sapphire bold"
format = "[$symbol$version]($style) "

[docker_context]
symbol = ""
style = "fg:blue bold"
format = "[$symbol $context]($style) "
only_with_files = true

# ───────────────────────────────────
# Fill + duration (правый край второй строки)
# ───────────────────────────────────
[fill]
symbol = " "

[cmd_duration]
min_time = 2000
style = "fg:peach bold"
format = "󱎫 [$duration]($style) "

# ───────────────────────────────────
# Time (right_format)
# ───────────────────────────────────
[time]
disabled = false
time_format = "%H:%M:%S"
style = "fg:overlay1"
format = "[󰥔 $time]($style)"

# ───────────────────────────────────
# Prompt character
# ───────────────────────────────────
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold yellow)"

# ───────────────────────────────────
# Отключаем шум
# ───────────────────────────────────
[username]
disabled = true
[hostname]
disabled = true
[battery]
disabled = true
[memory_usage]
disabled = true
[package]
disabled = true
[jobs]
symbol = "󰜎 "
style = "fg:yellow"
